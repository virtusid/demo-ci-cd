---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: demo-app
  namespace: demo-project
spec:
  lookupPolicy:
    local: true

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: demo-app
  namespace: demo-project
spec:
  source:
    type: Git
    git:
      uri: https://github.com/your-org/demo-app.git
      ref: main
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        namespace: openshift
        name: python:3.11-ubi9
  output:
    to:
      kind: ImageStreamTag
      name: demo-app:latest
  triggers:
    - type: ConfigChange
    - type: ImageChange

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-project
  annotations:
    image.openshift.io/triggers: >
      [{"from":{"kind":"ImageStreamTag","name":"demo-app:latest","namespace":"demo-project"},
        "fieldPath":"spec.template.spec.containers[?(@.name==\"demo-app\")].image"}]
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: image-registry.openshift-image-registry.svc:5000/demo-project/demo-app:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo-project
spec:
  selector:
    app: demo-app
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-app
  namespace: demo-project
spec:
  to:
    kind: Service
    name: demo-app
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

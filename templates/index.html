<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenShift Demo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ee0000, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #718096;
      margin-bottom: 2rem;
      font-size: 1rem;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.2rem;
    }
    .card-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #718096;
      margin-bottom: 0.4rem;
    }
    .card-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-all;
    }
    .badge {
      display: inline-block;
      background: #1a2a1a;
      border: 1px solid #276749;
      color: #68d391;
      font-size: 0.8rem;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 2rem;
    }
    .endpoints {
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: left;
    }
    .endpoints h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #718096;
      margin-bottom: 0.8rem;
    }
    .endpoint {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.4rem 0;
    }
    .method {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: #1a2a3a;
      color: #63b3ed;
      border: 1px solid #2b6cb0;
      min-width: 40px;
      text-align: center;
    }
    .path { font-size: 0.9rem; color: #a0aec0; font-family: monospace; }
    .desc { font-size: 0.8rem; color: #4a5568; margin-left: auto; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⛵</div>
    <h1>OpenShift Demo</h1>
    <p class="subtitle">Demo Flask app running on OpenShift</p>

    <div class="badge">● Running</div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Version</div>
        <div class="card-value">{{ version }}</div>
      </div>
      <div class="card">
        <div class="card-label">Pod</div>
        <div class="card-value">{{ pod_name }}</div>
      </div>
      <div class="card">
        <div class="card-label">Environment</div>
        <div class="card-value">{{ environment }}</div>
      </div>
    </div>

    <div class="endpoints">
      <h3>Endpoints</h3>
      <div class="endpoint">
        <span class="method">GET</span>
        <span class="path">/</span>
        <span class="desc">This page</span>
      </div>
      <div class="endpoint">
        <span class="method">GET</span>
        <span class="path">/health</span>
        <span class="desc">Readiness probe</span>
      </div>
      <div class="endpoint">
        <span class="method">GET</span>
        <span class="path">/info</span>
        <span class="desc">App info JSON</span>
      </div>
    </div>
  </div>
</body>
</html>
